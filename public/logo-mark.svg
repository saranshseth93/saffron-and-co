<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring suggesting a spice mortar / coffee cup rim -->
  <circle cx="20" cy="20" r="18" fill="none" stroke="#E8A838" stroke-width="1" opacity="0.6"/>
  <!-- Inner S monogram -->
  <text x="20" y="27" text-anchor="middle" fill="#F5EDE0" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" letter-spacing="1">S</text>
  <!-- Small ampersand accent -->
  <text x="30" y="16" text-anchor="middle" fill="#E8A838" font-family="Georgia, 'Times New Roman', serif" font-size="9" font-style="italic" opacity="0.7">&amp;</text>
</svg>
